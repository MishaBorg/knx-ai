<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KNX Copilot</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    margin: 0;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

.title {
    font-size: 28px;
    margin-bottom: 20px;
}

.chat {
    background: #111827;
    border-radius: 12px;
    padding: 20px;
    height: 400px;
    overflow-y: auto;
}

.message {
    margin-bottom: 15px;
}

.user {
    text-align: right;
    color: #38bdf8;
}

.bot {
    text-align: left;
    color: #cbd5e1;
}

textarea {
    width: 100%;
    background: #111827;
    color: white;
    border: 1px solid #374151;
    border-radius: 8px;
    padding: 10px;
    margin-top: 15px;
}

button {
    margin-top: 10px;
    background: #2563eb;
    border: none;
    color: white;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}
</style>
</head>

<body>

<div class="container">

<div class="title">⚡ KNX Copilot</div>

<div id="chat" class="chat"></div>

<textarea id="input" rows="3" placeholder="Describe your KNX scenario..."></textarea>

<br>

<button onclick="send()">Generate</button>

<button onclick="downloadCSV()">Download CSV</button>

</div>

<script>

function addMessage(text, type) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.className = "message " + type;

    div.textContent = text;

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
}

function formatProject(project) {

    let text = "📊 KNX PROJECT:\\n\\n";

    text += "📍 Group Addresses:\\n";

    project.group_addresses.forEach(a => {
        text += `- ${a.name} → ${a.address}\\n`;
    });

    text += "\\n🔗 Connections:\\n";

    project.links.forEach(l => {
        text += `- ${l.from} → ${l.to} (${l.group_address})\\n`;
    });

    return text;
}

async function send() {

    const input = document.getElementById("input");

    const text = input.value;

    if (!text) return;

    addMessage(text, "user");

    const response = await fetch("/generate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
    });

    const data = await response.json();

    addMessage(formatProject(data.project), "bot");

    input.value = "";
}

function downloadCSV() {
    window.location.href = "/download";
}

</script>

</body>
</html>
